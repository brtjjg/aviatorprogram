<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Aviator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ AVIATOR</h1>
            <div class="balance">💰 Balance: $<span id="balance">1000.00</span></div>
        </header>

        <div class="game-area">
            <div class="multiplier-display">
                <span id="multiplier">1.00</span><span>x</span>
            </div>
            <div class="status" id="status">Press "Place Bet" to start</div>
        </div>

        <div class="controls">
            <div class="bet-input">
                <label for="betAmount">Bet Amount ($)</label>
                <input type="number" id="betAmount" value="10.00" step="0.50" min="0.50">
            </div>
            <div class="buttons">
                <button id="placeBtn" class="btn btn-place">🛫 Place Bet</button>
                <button id="cashBtn" class="btn btn-cash" disabled>💰 Cash Out</button>
            </div>
        </div>

        <div class="history">
            <h3>Recent Results</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
